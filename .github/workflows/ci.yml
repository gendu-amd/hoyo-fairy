name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Verify built artifact is committed (no drift)
        run: |
          if ! git diff --quiet -- biliHoyoFairy.user.js; then
            echo "::error::biliHoyoFairy.user.js 与源码不一致：改完 src/ 后请运行 npm run build 并提交产物。"
            git --no-pager diff -- biliHoyoFairy.user.js | head -50
            exit 1
          fi
